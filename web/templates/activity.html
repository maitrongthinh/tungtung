<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Feed – Shopee Agent</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .activity-wrap { max-width: 900px; margin: 0 auto; }
    .activity-toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .activity-toolbar select, .activity-toolbar input { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .activity-toolbar .badge-live { background: #22c55e; color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 600; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .feed { display: flex; flex-direction: column; gap: 6px; }
    .event-card {
      display: grid;
      grid-template-columns: 130px 110px 1fr;
      gap: 8px;
      align-items: start;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      transition: background 0.3s;
    }
    .event-card.new { background: #f0fdf4; border-color: #86efac; }
    .event-card .ts { color: #888; font-size: 11px; white-space: nowrap; }
    .event-card .badge-type {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-crawl { background: #dbeafe; color: #1d4ed8; }
    .badge-crawl_done { background: #bfdbfe; color: #1e3a8a; }
    .badge-score { background: #fef3c7; color: #92400e; }
    .badge-score_done { background: #fde68a; color: #78350f; }
    .badge-draft_done { background: #d1fae5; color: #065f46; }
    .badge-published { background: #22c55e; color: #fff; }
    .badge-publish_failed { background: #fee2e2; color: #991b1b; }
    .badge-error { background: #fca5a5; color: #7f1d1d; }
    .badge-default { background: #f3f4f6; color: #374151; }
    .event-msg { color: #111; line-height: 1.4; }
    .event-detail { font-size: 11px; color: #6b7280; margin-top: 3px; font-family: monospace; word-break: break-all; }
    .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-item { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 18px; text-align: center; min-width: 90px; }
    .stat-item .num { font-size: 22px; font-weight: 700; color: #111; }
    .stat-item .lbl { font-size: 11px; color: #6b7280; margin-top: 2px; }
    #noMore { text-align: center; color: #9ca3af; padding: 20px; font-size: 13px; display: none; }
    .scroll-top-btn { position: fixed; bottom: 24px; right: 24px; background: #6366f1; color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.2); display: none; }
    .activity-wrap h1 { font-size: 20px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="/" class="nav-brand">Shopee Agent</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/posts">Posts</a>
      <a href="/chat">Chat AI</a>
      <a href="/editor">Editor</a>
      <a href="/config">Config</a>
      <a href="/activity" class="active">Activity</a>
    </div>
  </nav>

  <main class="page">
    <div class="activity-wrap">
      <header style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div>
          <h1>Activity Feed</h1>
          <p class="muted" style="margin:0">Luồng hoạt động của bot — từ lần đầu tiên đến hiện tại</p>
        </div>
        <span class="badge-live" id="liveIndicator">● LIVE</span>
      </header>

      <div class="stats-bar" id="statsBar">
        <div class="stat-item"><div class="num" id="statTotal">0</div><div class="lbl">Tổng sự kiện</div></div>
        <div class="stat-item"><div class="num" id="statPublished">0</div><div class="lbl">Đã đăng</div></div>
        <div class="stat-item"><div class="num" id="statDraft">0</div><div class="lbl">Draft tạo</div></div>
        <div class="stat-item"><div class="num" id="statCrawl">0</div><div class="lbl">Crawl xong</div></div>
        <div class="stat-item"><div class="num" id="statFailed">0</div><div class="lbl">Thất bại</div></div>
      </div>

      <div class="activity-toolbar">
        <select id="filterType">
          <option value="">Tất cả sự kiện</option>
          <option value="published">Đã đăng</option>
          <option value="publish_failed">Đăng thất bại</option>
          <option value="draft_done">Draft tạo</option>
          <option value="crawl_done">Crawl xong</option>
          <option value="score_done">Chấm điểm</option>
          <option value="crawl">Crawl bắt đầu</option>
          <option value="error">Lỗi</option>
        </select>
        <input type="text" id="filterSearch" placeholder="Tìm kiếm..." style="flex:1;min-width:160px" />
        <label style="font-size:13px;display:flex;align-items:center;gap:6px">
          <input type="checkbox" id="autoScroll" checked /> Auto-scroll mới nhất
        </label>
        <button onclick="clearFilters()" style="font-size:12px;padding:6px 12px">Reset</button>
      </div>

      <div class="feed" id="feed"></div>
      <div id="noMore">Đã hiển thị toàn bộ lịch sử</div>
    </div>
    <button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  </main>

  <script>
    const feed = document.getElementById('feed');
    const filterType = document.getElementById('filterType');
    const filterSearch = document.getElementById('filterSearch');
    const autoScroll = document.getElementById('autoScroll');
    let allEvents = [];
    let stats = { total: 0, published: 0, draft: 0, crawl: 0, failed: 0 };

    function getBadgeClass(type) {
      const map = {
        crawl: 'badge-crawl', crawl_done: 'badge-crawl_done',
        score: 'badge-score', score_done: 'badge-score_done',
        draft_done: 'badge-draft_done',
        published: 'badge-published',
        publish_failed: 'badge-publish_failed',
        error: 'badge-error',
      };
      return map[type] || 'badge-default';
    }

    function formatTs(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getDate())}/${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function makeCard(ev, isNew = false) {
      const card = document.createElement('div');
      card.className = 'event-card' + (isNew ? ' new' : '');
      card.dataset.type = ev.event_type;
      card.dataset.msg = (ev.message || '').toLowerCase();

      let detailHtml = '';
      if (ev.detail) {
        const d = ev.detail;
        const parts = [];
        if (d.product) parts.push('📦 ' + d.product);
        if (d.count !== undefined) parts.push('📊 ' + d.count + ' items');
        if (d.categories) parts.push('🏷️ ' + (Array.isArray(d.categories) ? d.categories.join(', ') : d.categories));
        if (d.fb_post_id) parts.push('🔗 FB: ' + d.fb_post_id);
        if (d.error) parts.push('⚠️ ' + d.error.slice(0, 100));
        if (d.products && Array.isArray(d.products)) parts.push('📝 ' + d.products.slice(0,3).join(' | '));
        if (parts.length) detailHtml = `<div class="event-detail">${parts.join(' &nbsp;·&nbsp; ')}</div>`;
      }

      card.innerHTML = `
        <div class="ts">${formatTs(ev.ts)}</div>
        <div><span class="badge-type ${getBadgeClass(ev.event_type)}">${ev.event_type}</span></div>
        <div>
          <div class="event-msg">${ev.message}</div>
          ${detailHtml}
        </div>
      `;
      if (isNew) setTimeout(() => card.classList.remove('new'), 3000);
      return card;
    }

    function applyFilters() {
      const typeVal = filterType.value;
      const searchVal = filterSearch.value.toLowerCase();
      let shown = 0;
      const cards = feed.querySelectorAll('.event-card');
      cards.forEach(card => {
        const typeMatch = !typeVal || card.dataset.type === typeVal;
        const searchMatch = !searchVal || card.dataset.msg.includes(searchVal);
        card.style.display = (typeMatch && searchMatch) ? '' : 'none';
        if (typeMatch && searchMatch) shown++;
      });
    }

    function clearFilters() {
      filterType.value = '';
      filterSearch.value = '';
      applyFilters();
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = stats.total;
      document.getElementById('statPublished').textContent = stats.published;
      document.getElementById('statDraft').textContent = stats.draft;
      document.getElementById('statCrawl').textContent = stats.crawl;
      document.getElementById('statFailed').textContent = stats.failed;
    }

    function countEvent(type) {
      stats.total++;
      if (type === 'published') stats.published++;
      if (type === 'draft_done') stats.draft++;
      if (type === 'crawl_done') stats.crawl++;
      if (type === 'publish_failed') stats.failed++;
    }

    // SSE stream từ server
    const sse = new EventSource('/api/activity/stream');
    let seenIds = new Set();

    sse.addEventListener('activity', e => {
      try {
        const ev = JSON.parse(e.data);
        if (seenIds.has(ev.id)) return;
        seenIds.add(ev.id);

        countEvent(ev.event_type);
        updateStats();

        const isNew = seenIds.size > 500; // đầu tiên load history, sau đó mới "new"
        const card = makeCard(ev, isNew);
        feed.appendChild(card);
        applyFilters();

        if (isNew && autoScroll.checked) {
          card.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
      } catch {}
    });

    sse.addEventListener('error', () => {
      document.getElementById('liveIndicator').textContent = '● OFFLINE';
      document.getElementById('liveIndicator').style.background = '#ef4444';
    });

    // Filter listeners
    filterType.addEventListener('change', applyFilters);
    filterSearch.addEventListener('input', applyFilters);

    // Scroll-to-top button
    window.addEventListener('scroll', () => {
      document.getElementById('scrollTopBtn').style.display = window.scrollY > 400 ? 'block' : 'none';
    });
  </script>
</body>
</html>
